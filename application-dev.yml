
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9093/eureka
  instance:
    prefer-ip-address: true

spring:
  datasource:
    url:  jdbc:mysql://localhost:3306/microservice
    username:  root
    password:  root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
